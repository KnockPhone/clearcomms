# ClearComms production stack: the Node app behind Caddy (automatic HTTPS).
# Caddy obtains and renews a Let's Encrypt certificate for your domain
# automatically, as long as DNS points at this server and ports 80/443 are open.

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_URL: ${APP_URL}
      DATABASE_DIR: /app/data
      SESSION_SECRET: ${SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      FREE_MONTHLY_CHECKS: ${FREE_MONTHLY_CHECKS:-20}
    volumes:
      - ccdata:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app

volumes:
  ccdata:
  caddydata:
  caddyconfig:
